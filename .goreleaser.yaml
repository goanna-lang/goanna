version: 2

builds:
  - id: transpiler
    dir: transpiler
    main: ./cmd/goanna
    binary: goanna
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: transpiler
    builds:
      - transpiler
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "goanna_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
