name: Release

on:
  push:
    branches: [main]
    tags:
      - 'lsp/v*'

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['transpiler--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-lsp:
    name: Tag LSP submodule
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: transpiler/go.mod
          cache: false

      - name: Pin transpiler version and tag LSP
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#transpiler/}"
          gh auth setup-git
          if ! git ls-remote --exit-code --tags origin "transpiler/${VERSION}" > /dev/null 2>&1; then
            git tag "transpiler/${VERSION}"
            git push origin "transpiler/${VERSION}"
          fi
          cd lsp
          GOWORK=off go get "github.com/goanna-lang/goanna/transpiler@${VERSION}"
          GOWORK=off go mod tidy
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lsp/go.mod lsp/go.sum
          if ! git diff --cached --quiet; then
            BRANCH="chore/pin-lsp-${VERSION}"
            git checkout -b "$BRANCH"
            git commit -m "chore: pin lsp dependency to ${VERSION}"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: pin lsp dependency to ${VERSION}" \
              --body "Auto-generated: pin lsp dependency to transpiler ${VERSION}" \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --auto --squash --delete-branch
          fi
          if ! git ls-remote --exit-code --tags origin "lsp/${VERSION}" > /dev/null 2>&1; then
            git tag "lsp/${VERSION}"
            git push origin "lsp/${VERSION}"
          fi

  goreleaser-transpiler:
    name: Release transpiler binaries
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: transpiler/go.mod
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.release-please.outputs.tag_name }}

  goreleaser-lsp:
    name: Release LSP binaries
    if: startsWith(github.ref, 'refs/tags/lsp/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: lsp/go.mod
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser-lsp.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
