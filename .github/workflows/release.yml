name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-lsp:
    name: Tag LSP submodule
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: transpiler/go.mod
          cache-dependency-path: transpiler/go.sum

      - name: Pin transpiler version and tag LSP
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd lsp
          GOWORK=off go get "github.com/nahmanmate/goanna@${TAG}"
          GOWORK=off go mod tidy
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lsp/go.mod lsp/go.sum
          git commit -m "chore: pin lsp dependency to ${TAG}"
          git push
          git tag "lsp/${TAG}"
          git push origin "lsp/${TAG}"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: transpiler/go.mod
          cache-dependency-path: transpiler/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          cd transpiler
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "../goanna-${GOOS}-${GOARCH}${EXT}" ./cmd/goanna/...

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          gh release upload "$TAG" "goanna-${GOOS}-${GOARCH}${EXT}"
