name: goanna
description: Validate or generate Go code from .goa files using goanna
branding:
  icon: git-merge
  color: blue

inputs:
  mode:
    description: "'check' to validate without writing files; 'generate' to write transpiled .go files to disk"
    required: false
    default: check
  pattern:
    description: Go package pattern passed to goanna build (e.g. ./...)
    required: false
    default: ./...
  version:
    description: goanna version to install (e.g. v0.1.0 or latest)
    required: false
    default: latest
  go-version:
    description: Go version for setup-go. Empty string uses the version from go.mod
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: go.mod

    - name: Validate mode
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
      run: |
        if [[ "$MODE" != "check" && "$MODE" != "generate" ]]; then
          echo "Error: invalid mode '$MODE'. Must be 'check' or 'generate'." >&2
          exit 1
        fi

    - name: Install goanna
      shell: bash
      env:
        GOANNA_VERSION: ${{ inputs.version }}
      run: go install "github.com/goanna-lang/goanna/transpiler/cmd/goanna@${GOANNA_VERSION}"

    - name: Run goanna (check)
      if: inputs.mode == 'check'
      shell: bash
      env:
        GOANNA_PATTERN: ${{ inputs.pattern }}
      run: goanna build --check "${GOANNA_PATTERN}"

    - name: Run goanna (generate)
      if: inputs.mode == 'generate'
      shell: bash
      env:
        GOANNA_PATTERN: ${{ inputs.pattern }}
      run: goanna build --keep "${GOANNA_PATTERN}"
