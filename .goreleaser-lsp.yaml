version: 2

monorepo:
  tag_prefix: lsp/

builds:
  - id: lsp
    dir: lsp
    main: ./cmd/goanna-lsp
    binary: goanna-lsp
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: lsp
    builds:
      - lsp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "goanna-lsp_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
